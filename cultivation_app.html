<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cultivator's Ledger — Campaign Companion</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600;700&family=Cormorant+SC:wght@400;600&family=Noto+Serif+SC:wght@400;600;900&display=swap" rel="stylesheet">
<style>
  :root {
    --paper: #f4ebd6;
    --paper-dark: #e8dcc0;
    --paper-edge: #d9c9a5;
    --ink: #1a1410;
    --ink-soft: #3d2f22;
    --ink-faded: #7a6a56;
    --cinnabar: #a52a2a;
    --cinnabar-deep: #821a1a;
    --gold: #b8873a;
    --rule: #c4b189;
    --seal-red: #b83227;
    --green-jade: #3e6b4a;
    --white-karma: #d9cba0;
    --black-karma: #1a1410;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    background: #2a221a;
    font-family: 'Cormorant Garamond', Georgia, serif;
    color: var(--ink);
    min-height: 100vh;
  }

  .app {
    display: grid;
    grid-template-columns: 260px 1fr;
    min-height: 100vh;
    max-width: 1600px;
    margin: 0 auto;
    background: var(--paper);
    box-shadow: 0 25px 60px rgba(0,0,0,0.5);
    background-image:
      radial-gradient(ellipse at top left, rgba(184,135,58,0.08), transparent 45%),
      radial-gradient(ellipse at bottom right, rgba(165,42,42,0.05), transparent 50%),
      repeating-linear-gradient(0deg, transparent 0px, transparent 2px, rgba(26,20,16,0.015) 2px, rgba(26,20,16,0.015) 3px);
  }

  /* ===== SIDEBAR ===== */
  .sidebar {
    background: rgba(26,20,16,0.04);
    border-right: 1px solid var(--paper-edge);
    padding: 28px 0;
    display: flex;
    flex-direction: column;
  }

  .brand {
    padding: 0 24px 24px;
    border-bottom: 2px double var(--cinnabar);
    margin-bottom: 20px;
  }

  .brand-chinese {
    font-family: 'Noto Serif SC', serif;
    font-weight: 900;
    font-size: 28px;
    color: var(--cinnabar-deep);
    letter-spacing: 5px;
    line-height: 1;
  }

  .brand-english {
    font-family: 'Cormorant SC', serif;
    font-size: 11px;
    letter-spacing: 4px;
    color: var(--ink-faded);
    margin-top: 6px;
    text-transform: uppercase;
  }

  .nav-group {
    margin-bottom: 18px;
  }

  .nav-group-label {
    font-family: 'Cormorant SC', serif;
    font-size: 10px;
    letter-spacing: 3px;
    color: var(--ink-faded);
    text-transform: uppercase;
    padding: 8px 24px;
  }

  .nav-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 9px 24px;
    font-family: 'Cormorant Garamond', serif;
    font-size: 15px;
    color: var(--ink-soft);
    cursor: pointer;
    border-left: 3px solid transparent;
    transition: background 0.1s, border-color 0.1s;
  }

  .nav-item:hover {
    background: rgba(165,42,42,0.05);
    color: var(--ink);
  }

  .nav-item.active {
    border-left-color: var(--cinnabar);
    background: rgba(165,42,42,0.08);
    color: var(--cinnabar-deep);
    font-weight: 600;
  }

  .nav-item .nav-icon {
    font-family: 'Noto Serif SC', serif;
    font-size: 16px;
    color: var(--cinnabar);
    min-width: 20px;
    text-align: center;
  }

  .nav-item .count {
    margin-left: auto;
    font-family: 'Cormorant SC', serif;
    font-size: 10px;
    color: var(--ink-faded);
    letter-spacing: 1px;
  }

  /* ===== MAIN ===== */
  .main {
    padding: 36px 48px 60px;
    min-width: 0;
  }

  .page-header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 24px;
    padding-bottom: 18px;
    border-bottom: 2px double var(--cinnabar);
    margin-bottom: 28px;
  }

  .page-title {
    display: flex;
    align-items: baseline;
    gap: 18px;
  }

  .page-title .chinese {
    font-family: 'Noto Serif SC', serif;
    font-weight: 900;
    font-size: 30px;
    color: var(--cinnabar-deep);
    letter-spacing: 6px;
    line-height: 1;
  }

  .page-title .english {
    font-family: 'Cormorant SC', serif;
    font-size: 13px;
    letter-spacing: 4px;
    color: var(--ink-faded);
    text-transform: uppercase;
  }

  .page-actions {
    display: flex;
    gap: 10px;
  }

  /* ===== BUTTONS ===== */
  .btn {
    font-family: 'Cormorant SC', serif;
    font-size: 11px;
    letter-spacing: 2.5px;
    padding: 9px 18px;
    border: 1px solid var(--ink);
    background: transparent;
    color: var(--ink);
    cursor: pointer;
    text-transform: uppercase;
    transition: background 0.1s, color 0.1s, border-color 0.1s;
  }

  .btn:hover {
    background: var(--ink);
    color: var(--paper);
  }

  .btn.primary {
    background: var(--cinnabar);
    border-color: var(--cinnabar);
    color: var(--paper);
  }

  .btn.primary:hover {
    background: var(--cinnabar-deep);
    border-color: var(--cinnabar-deep);
  }

  .btn.small {
    padding: 5px 10px;
    font-size: 9px;
    letter-spacing: 1.5px;
  }

  .btn.ghost {
    border: 1px dashed var(--rule);
    color: var(--ink-faded);
  }

  .btn.ghost:hover {
    color: var(--cinnabar);
    border-color: var(--cinnabar);
    background: transparent;
  }

  .btn.danger {
    border-color: var(--cinnabar);
    color: var(--cinnabar);
  }
  .btn.danger:hover {
    background: var(--cinnabar);
    color: var(--paper);
  }

  /* ===== SECTION ===== */
  .section {
    margin-bottom: 28px;
  }

  .section-header {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 14px;
  }

  .section-header::before {
    content: '';
    display: block;
    width: 18px;
    height: 2px;
    background: var(--cinnabar);
  }

  .section-header h2 {
    font-family: 'Noto Serif SC', serif;
    font-weight: 600;
    font-size: 18px;
    color: var(--cinnabar-deep);
    letter-spacing: 3px;
    flex-shrink: 0;
  }

  .section-header .en {
    font-family: 'Cormorant SC', serif;
    font-size: 10px;
    letter-spacing: 3px;
    color: var(--ink-faded);
    text-transform: uppercase;
    padding-left: 4px;
  }

  .section-header::after {
    content: '';
    display: block;
    flex-grow: 1;
    height: 1px;
    background: var(--rule);
    opacity: 0.5;
  }

  /* ===== GRID LIST (library cards) ===== */
  .grid-list {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 16px;
  }

  .card {
    border: 1px solid var(--rule);
    background: rgba(244,235,214,0.5);
    padding: 16px 18px;
    position: relative;
    transition: border-color 0.1s, box-shadow 0.1s;
  }

  .card:hover {
    border-color: var(--cinnabar);
    box-shadow: 0 3px 10px rgba(0,0,0,0.08);
  }

  .card-tier {
    position: absolute;
    top: 10px;
    right: 12px;
    font-family: 'Cormorant SC', serif;
    font-size: 9px;
    letter-spacing: 2px;
    color: var(--cinnabar);
    text-transform: uppercase;
  }

  .card-name {
    font-family: 'Noto Serif SC', serif;
    font-weight: 600;
    font-size: 16px;
    color: var(--cinnabar-deep);
    margin-bottom: 4px;
    padding-right: 60px;
  }

  .card-subtitle {
    font-family: 'Cormorant SC', serif;
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--ink-faded);
    text-transform: uppercase;
    margin-bottom: 10px;
  }

  .card-body {
    font-size: 14px;
    color: var(--ink-soft);
    line-height: 1.45;
    min-height: 20px;
  }

  .card-meta {
    display: flex;
    gap: 12px;
    margin-top: 10px;
    padding-top: 10px;
    border-top: 1px dotted var(--rule);
    font-family: 'Cormorant SC', serif;
    font-size: 10px;
    letter-spacing: 1.5px;
    color: var(--ink-faded);
    text-transform: uppercase;
  }

  .card-actions {
    display: flex;
    gap: 6px;
    margin-top: 10px;
  }

  .card.empty {
    border-style: dashed;
    color: var(--ink-faded);
    text-align: center;
    padding: 36px 16px;
    cursor: pointer;
  }

  .card.empty:hover {
    border-color: var(--cinnabar);
    color: var(--cinnabar);
  }

  /* ===== FIELDS ===== */
  .field {
    display: flex;
    flex-direction: column;
    margin-bottom: 14px;
  }

  .field-label {
    font-family: 'Cormorant SC', serif;
    font-size: 10px;
    letter-spacing: 3px;
    color: var(--ink-faded);
    text-transform: uppercase;
    margin-bottom: 5px;
  }

  .field-input, .field-select, .field-textarea {
    border: none;
    border-bottom: 1px solid var(--ink);
    background: transparent;
    font-family: 'Cormorant Garamond', serif;
    font-size: 16px;
    color: var(--ink);
    padding: 4px 0;
    font-weight: 500;
    outline: none;
    width: 100%;
  }

  .field-textarea {
    border: 1px solid var(--rule);
    padding: 10px 12px;
    resize: vertical;
    min-height: 80px;
    line-height: 1.5;
    background: rgba(244,235,214,0.3);
  }

  .field-select {
    cursor: pointer;
  }

  .field-input:focus, .field-select:focus, .field-textarea:focus {
    border-bottom-color: var(--cinnabar);
  }
  .field-textarea:focus, .field-select:focus {
    border-color: var(--cinnabar);
  }

  .field-row {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 18px;
  }

  .field-row.two { grid-template-columns: 1fr 1fr; }
  .field-row.three { grid-template-columns: 1fr 1fr 1fr; }

  /* ===== DIALOG / MODAL ===== */
  .dialog-overlay {
    position: fixed;
    inset: 0;
    background: rgba(26,20,16,0.65);
    display: none;
    align-items: flex-start;
    justify-content: center;
    padding: 40px 20px;
    z-index: 100;
    overflow-y: auto;
  }

  .dialog-overlay.open { display: flex; }

  .dialog {
    background: var(--paper);
    max-width: 760px;
    width: 100%;
    padding: 32px 36px 28px;
    box-shadow: 0 20px 50px rgba(0,0,0,0.5);
    border: 1px solid var(--paper-edge);
    position: relative;
  }

  .dialog-close {
    position: absolute;
    top: 12px;
    right: 16px;
    background: transparent;
    border: none;
    font-size: 28px;
    color: var(--ink-faded);
    cursor: pointer;
    line-height: 1;
  }

  .dialog-close:hover { color: var(--cinnabar); }

  .dialog-title {
    font-family: 'Noto Serif SC', serif;
    font-size: 22px;
    font-weight: 600;
    color: var(--cinnabar-deep);
    letter-spacing: 4px;
    padding-bottom: 14px;
    border-bottom: 2px double var(--cinnabar);
    margin-bottom: 22px;
  }

  .dialog-footer {
    display: flex;
    gap: 10px;
    justify-content: flex-end;
    margin-top: 22px;
    padding-top: 16px;
    border-top: 1px solid var(--rule);
  }

  /* ===== CHARACTER EDITOR ===== */
  .char-editor {
    display: grid;
    grid-template-columns: 1.15fr 1fr;
    gap: 38px;
  }

  .char-editor > div { min-width: 0; }

  .identity-band {
    display: grid;
    grid-template-columns: 2fr 1fr 1fr;
    gap: 18px;
    margin-bottom: 22px;
  }

  .attributes {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 14px;
  }

  .attr {
    border: 1px solid var(--rule);
    padding: 12px 14px;
    background: rgba(244,235,214,0.4);
    text-align: center;
  }

  .attr-label {
    font-family: 'Noto Serif SC', serif;
    font-size: 18px;
    font-weight: 600;
    color: var(--cinnabar-deep);
    letter-spacing: 2px;
  }

  .attr-en {
    font-family: 'Cormorant SC', serif;
    font-size: 9px;
    letter-spacing: 2px;
    color: var(--ink-faded);
    text-transform: uppercase;
    margin: 2px 0 8px;
  }

  .attr-input {
    border: none;
    border-bottom: 1px solid var(--ink);
    background: transparent;
    font-family: 'Cormorant Garamond', serif;
    font-size: 22px;
    font-weight: 600;
    color: var(--ink);
    padding: 2px 0;
    text-align: center;
    width: 80%;
    outline: none;
  }

  .attr-input:focus { border-bottom-color: var(--cinnabar); }

  /* ===== DOT TRACKS ===== */
  .dot-row {
    display: flex;
    gap: 5px;
    align-items: center;
  }

  .dot {
    width: 14px;
    height: 14px;
    border-radius: 50%;
    border: 1.5px solid var(--ink);
    cursor: pointer;
    background: transparent;
    transition: background 0.1s;
  }

  .dot.filled { background: var(--ink); }
  .dot.cinnabar { border-color: var(--cinnabar); }
  .dot.cinnabar.filled { background: var(--cinnabar); }
  .dot.white-filled { background: var(--white-karma); border-color: var(--gold); }
  .dot.black-filled { background: var(--black-karma); }

  /* ===== LIST ROWS (in character editor) ===== */
  .list-rows {
    border: 1px solid var(--rule);
    background: rgba(244,235,214,0.3);
    padding: 6px 0;
  }

  .list-row {
    display: grid;
    grid-template-columns: 1fr auto auto;
    gap: 10px;
    align-items: center;
    padding: 7px 14px;
    border-bottom: 1px dotted var(--rule);
  }

  .list-row:last-child { border-bottom: none; }

  .list-row-name {
    font-size: 14px;
    color: var(--ink);
    font-weight: 500;
  }

  .list-row-meta {
    font-family: 'Cormorant SC', serif;
    font-size: 10px;
    letter-spacing: 1.5px;
    color: var(--ink-faded);
    text-transform: uppercase;
  }

  .row-delete {
    background: transparent;
    border: none;
    font-size: 18px;
    color: var(--ink-faded);
    cursor: pointer;
    line-height: 1;
    padding: 2px 6px;
  }

  .row-delete:hover { color: var(--cinnabar); }

  .list-empty {
    padding: 18px;
    text-align: center;
    font-family: 'Cormorant SC', serif;
    font-size: 11px;
    letter-spacing: 2px;
    color: var(--ink-faded);
    text-transform: uppercase;
  }

  /* ===== PICKER (modal for picking library items) ===== */
  .picker-list {
    max-height: 400px;
    overflow-y: auto;
    border: 1px solid var(--rule);
    background: rgba(244,235,214,0.3);
  }

  .picker-item {
    padding: 10px 14px;
    border-bottom: 1px dotted var(--rule);
    cursor: pointer;
    transition: background 0.1s;
  }

  .picker-item:hover { background: rgba(165,42,42,0.08); }

  .picker-item-name {
    font-family: 'Noto Serif SC', serif;
    font-weight: 600;
    font-size: 14px;
    color: var(--cinnabar-deep);
  }

  .picker-item-meta {
    font-family: 'Cormorant SC', serif;
    font-size: 10px;
    letter-spacing: 1.5px;
    color: var(--ink-faded);
    margin-top: 2px;
    text-transform: uppercase;
  }

  .picker-search {
    width: 100%;
    padding: 8px 12px;
    border: 1px solid var(--rule);
    background: var(--paper);
    font-family: 'Cormorant Garamond', serif;
    font-size: 14px;
    margin-bottom: 10px;
    outline: none;
  }
  .picker-search:focus { border-color: var(--cinnabar); }

  /* ===== NOTICE ===== */
  .notice {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: var(--ink);
    color: var(--paper);
    padding: 12px 20px;
    font-family: 'Cormorant SC', serif;
    font-size: 12px;
    letter-spacing: 2px;
    text-transform: uppercase;
    box-shadow: 0 6px 20px rgba(0,0,0,0.4);
    opacity: 0;
    transition: opacity 0.25s;
    z-index: 200;
  }

  .notice.show { opacity: 1; }

  .notice.cinnabar { background: var(--cinnabar); }

  /* ===== MODE TOGGLE ===== */
  .mode-toggle {
    display: flex;
    border: 1px solid var(--ink);
    margin: 0 24px 18px;
  }

  .mode-btn {
    flex: 1;
    padding: 7px 8px;
    background: transparent;
    border: none;
    font-family: 'Cormorant SC', serif;
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--ink);
    cursor: pointer;
    text-transform: uppercase;
  }

  .mode-btn.active {
    background: var(--ink);
    color: var(--paper);
  }

  /* ===== SEARCH BAR ===== */
  .toolbar {
    display: flex;
    gap: 12px;
    margin-bottom: 20px;
    align-items: center;
  }

  .search-input {
    flex: 1;
    max-width: 400px;
    padding: 8px 14px;
    border: 1px solid var(--rule);
    background: var(--paper);
    font-family: 'Cormorant Garamond', serif;
    font-size: 14px;
    outline: none;
  }
  .search-input:focus { border-color: var(--cinnabar); }

  .filter-chips {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }

  .chip {
    font-family: 'Cormorant SC', serif;
    font-size: 10px;
    letter-spacing: 1.5px;
    padding: 5px 12px;
    border: 1px solid var(--rule);
    color: var(--ink-faded);
    cursor: pointer;
    text-transform: uppercase;
    background: transparent;
  }

  .chip.active {
    border-color: var(--cinnabar);
    color: var(--cinnabar);
    background: rgba(165,42,42,0.06);
  }

  /* ===== HOME / DASHBOARD ===== */
  .stat-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 16px;
    margin-bottom: 32px;
  }

  .stat {
    border: 1px solid var(--rule);
    padding: 18px 20px;
    background: rgba(244,235,214,0.4);
  }

  .stat-value {
    font-family: 'Noto Serif SC', serif;
    font-size: 32px;
    font-weight: 600;
    color: var(--cinnabar-deep);
    line-height: 1;
  }

  .stat-label {
    font-family: 'Cormorant SC', serif;
    font-size: 10px;
    letter-spacing: 2.5px;
    color: var(--ink-faded);
    text-transform: uppercase;
    margin-top: 8px;
  }

  .ethos {
    font-family: 'Cormorant Garamond', serif;
    font-size: 15px;
    font-style: italic;
    color: var(--ink-soft);
    line-height: 1.6;
    padding: 18px 22px;
    border-left: 3px solid var(--cinnabar);
    background: rgba(244,235,214,0.4);
    margin-bottom: 24px;
  }

  .footer {
    margin-top: 40px;
    padding-top: 20px;
    border-top: 1px solid var(--rule);
    font-family: 'Noto Serif SC', serif;
    font-size: 11px;
    letter-spacing: 3px;
    color: var(--ink-faded);
    text-align: center;
    text-transform: uppercase;
  }

  /* Narrative-weight box */
  .note-box {
    padding: 12px 14px;
    border: 1px dashed var(--rule);
    font-size: 13px;
    color: var(--ink-soft);
    font-style: italic;
    background: rgba(244,235,214,0.3);
    margin-bottom: 14px;
  }

  /* Track of filled/unfilled boxes (wounds, seclusion) */
  .box-track {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
  }

  .box-cell {
    width: 18px;
    height: 18px;
    border: 1px solid var(--ink);
    cursor: pointer;
    transition: background 0.1s;
  }

  .box-cell.filled { background: var(--cinnabar); }
  .box-cell.critical { background: var(--cinnabar-deep); border-color: var(--cinnabar-deep); }

  .inline-label {
    font-family: 'Cormorant SC', serif;
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--ink-faded);
    text-transform: uppercase;
    margin-right: 8px;
  }

  /* ===== DERIVED STATS PANEL ===== */
  .derived-panel {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 8px 22px;
    background: rgba(184,135,58,0.06);
    border: 1px solid var(--rule);
    padding: 14px 18px;
  }

  .derived-row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    gap: 8px;
    border-bottom: 1px dotted var(--rule);
    padding: 4px 0;
  }

  .derived-row.full {
    grid-column: 1 / -1;
  }

  .derived-label {
    font-family: 'Cormorant SC', serif;
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--ink-faded);
    text-transform: uppercase;
  }

  .derived-val {
    font-family: 'Cormorant Garamond', serif;
    font-size: 16px;
    font-weight: 600;
    color: var(--cinnabar-deep);
  }

  .qi-line {
    display: flex;
    align-items: baseline;
    gap: 10px;
    padding: 8px 0;
  }

  .qi-current {
    font-family: 'Cormorant Garamond', serif;
    font-size: 22px;

<script>
// ============================================================================
// STATE & STORAGE
// ============================================================================

const STORAGE_KEY = 'cultivation_ttrpg_v1';
const SCHEMA_VERSION = 1;

const DEFAULT_STATE = {
  version: SCHEMA_VERSION,
  meta: { mode: 'gm' },
  library: {
    techniques: [],
    methods: [],
    items: []
  },
  characters: []
};

let state = loadState();

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return structuredClone(DEFAULT_STATE);
    const parsed = JSON.parse(raw);
    // Ensure shape
    if (!parsed.library) parsed.library = { techniques: [], methods: [], items: [] };
    if (!parsed.library.techniques) parsed.library.techniques = [];
    if (!parsed.library.methods) parsed.library.methods = [];
    if (!parsed.library.items) parsed.library.items = [];
    if (!parsed.characters) parsed.characters = [];
    if (!parsed.meta) parsed.meta = { mode: 'gm' };
    return parsed;
  } catch (e) {
    console.error('Failed to load state', e);
    return structuredClone(DEFAULT_STATE);
  }
}

function saveState() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  refreshCounts();
}

function uid() {
  return 'id_' + Date.now().toString(36) + '_' + Math.random().toString(36).slice(2, 8);
}

function nowIso() { return new Date().toISOString(); }

// ============================================================================
// UTILITIES
// ============================================================================

function h(tag, attrs = {}, ...children) {
  const el = document.createElement(tag);
  for (const [k, v] of Object.entries(attrs)) {
    if (k === 'class') el.className = v;
    else if (k === 'html') el.innerHTML = v;
    else if (k.startsWith('on')) el.addEventListener(k.slice(2), v);
    else if (k === 'style' && typeof v === 'object') Object.assign(el.style, v);
    else if (v === true) el.setAttribute(k, '');
    else if (v === false || v == null) {}
    else el.setAttribute(k, v);
  }
  for (const child of children.flat()) {
    if (child == null || child === false) continue;
    el.appendChild(typeof child === 'string' ? document.createTextNode(child) : child);
  }
  return el;
}

function clear(el) { while (el.firstChild) el.removeChild(el.firstChild); }

function escapeHtml(s) {
  if (s == null) return '';
  return String(s).replace(/[&<>"']/g, c => ({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
  })[c]);
}

function notice(msg, color) {
  const n = document.getElementById('notice');
  n.textContent = msg;
  n.className = 'notice show' + (color ? ' ' + color : '');
  clearTimeout(notice._t);
  notice._t = setTimeout(() => { n.className = 'notice'; }, 2200);
}

function confirmDialog(msg) {
  return new Promise(resolve => {
    openDialog({
      title: 'Confirm',
      content: h('div', {}, h('p', { style: { fontSize: '15px', lineHeight: '1.5' } }, msg)),
      actions: [
        { label: 'Cancel', handler: () => { closeDialog(); resolve(false); } },
        { label: 'Confirm', primary: true, handler: () => { closeDialog(); resolve(true); } }
      ]
    });
  });
}

// ============================================================================
// DIALOG
// ============================================================================

function openDialog({ title, content, actions }) {
  const overlay = document.getElementById('dialog-overlay');
  const holder = document.getElementById('dialog-content');
  clear(holder);
  if (title) {
    holder.appendChild(h('div', { class: 'dialog-title' }, title));
  }
  if (content) {
    holder.appendChild(content);
  }
  if (actions && actions.length) {
    const footer = h('div', { class: 'dialog-footer' });
    actions.forEach(a => {
      footer.appendChild(h('button', {
        class: 'btn' + (a.primary ? ' primary' : '') + (a.danger ? ' danger' : ''),
        onclick: a.handler
      }, a.label));
    });
    holder.appendChild(footer);
  }
  overlay.classList.add('open');
}

function closeDialog() {
  document.getElementById('dialog-overlay').classList.remove('open');
}

document.getElementById('dialog-close').addEventListener('click', closeDialog);
document.getElementById('dialog-overlay').addEventListener('click', (e) => {
  if (e.target === e.currentTarget) closeDialog();
});

const TECHNIQUE_TIERS = ['Spirit', 'Mysterious', 'Celestial', 'Void', 'Nirvana'];

  'Mortal', 'Qi Condensation', 'Foundation Establishment', 'Core Formation',
  'Nascent Soul', 'Soul Formation', 'Soul Transformation', 'Ascendant',
  'Nirvana Scryer', 'Nirvana Cleanser', 'Nirvana Shatterer'
];
const SUB_STAGES = ['Early', 'Mid', 'Late', 'Peak'];

// Realm → base tier (Early sub-stage). Add 0/1/2/3 for Early/Mid/Late/Peak.
const REALM_BASE_TIER = {
  'Mortal': 0,
  'Qi Condensation': 1,
  'Foundation Establishment': 5,
  'Core Formation': 9,
  'Nascent Soul': 13,
  'Soul Formation': 17,
  'Soul Transformation': 21,
  'Ascendant': 25,
  'Nirvana Scryer': 29,
  'Nirvana Cleanser': 33,
  'Nirvana Shatterer': 37
};

const LIFESPAN_BY_REALM = {
  'Mortal': '~80 years',
  'Qi Condensation': '~120 years',
  'Foundation Establishment': '~200 years',
  'Core Formation': '~500 years',
  'Nascent Soul': '~1,000 years',
  'Soul Formation': '~3,000 years',
  'Soul Transformation': '~10,000 years',
  'Ascendant': '~30,000 years',
  'Nirvana Scryer': 'Immortal',
  'Nirvana Cleanser': 'Immortal',
  'Nirvana Shatterer': 'Immortal'
};

function getTier(realm, substage) {
  if (!realm) return 0;
  if (realm === 'Mortal') return 0;
  const base = REALM_BASE_TIER[realm];
  if (base == null) return 0;
  const idx = Math.max(0, SUB_STAGES.indexOf(substage || 'Early'));
  return base + idx;
}

function computeDerived(c) {
  const tier = getTier(c.realm, c.substage);
  const body = c.attributes?.body || 0;
  const qi = c.attributes?.qi || 0;
  const soul = c.attributes?.soul || 0;
  return {
    tier,
    woundCap: tier + body,
    qiMax: tier * 10 + qi * 5,
    senseRange: (tier + soul) * 10,
    soulDefense: tier + soul,
    presence: tier,
    heartOaths: Math.floor(tier / 2) + 1,
    lifespan: LIFESPAN_BY_REALM[c.realm] || '—'
  };
}

// Advance/regress by one sub-stage. Handles realm transitions.
function advanceCharacterStage(c, dir) {
  const realmIdx = REALMS.indexOf(c.realm || 'Mortal');
  const subIdx = SUB_STAGES.indexOf(c.substage || 'Early');

  if (dir > 0) {
    if (c.realm === 'Mortal') {
      c.realm = 'Qi Condensation';
      c.substage = 'Early';
      return;
    }
    if (subIdx < SUB_STAGES.length - 1) {
      c.substage = SUB_STAGES[subIdx + 1];
    } else if (realmIdx < REALMS.length - 1) {
      c.realm = REALMS[realmIdx + 1];
      c.substage = 'Early';
    }
  } else {
    if (c.realm === 'Mortal') return;
    if (subIdx > 0) {
      c.substage = SUB_STAGES[subIdx - 1];
    } else {
      // Regress to previous realm's Peak (or Mortal)
      const prev = REALMS[realmIdx - 1];
      c.realm = prev;
      c.substage = prev === 'Mortal' ? 'Early' : 'Peak';
    }
  }
}

// Spec per root grade: what element selection is required?
function getRootElementSpec(grade) {
  if (!grade) return null;
  if (grade.startsWith('Heavenly Spiritual')) return { type: 'pick', min: 1, max: 1, hint: 'Pick 1 pure element.' };
  if (grade.startsWith('Heavenly Dao'))       return { type: 'pick', min: 2, max: 2, harmonious: true, hint: 'Pick 2 harmonious elements — adjacent on the generative cycle.' };
  if (grade.startsWith('Superior'))           return { type: 'pick', min: 3, max: 3, hint: 'Pick any 3 elements. Three harmonious in sequence are strongest.' };
  if (grade.startsWith('Common'))             return { type: 'pick', min: 4, max: 5, hint: 'Pick 4 or 5 elements. Some internal conflict is unavoidable.' };
  if (grade.startsWith('Mortal'))             return { type: 'fixed', elements: [...FIVE_ELEMENTS], hint: 'All five elements, impure. No element bonus — and no penalty.' };
  if (grade.startsWith('Broken'))             return { type: 'none', hint: 'Damaged root. Cannot cultivate through normal means.' };

  if (grade.startsWith('Heavenly Body'))      return { type: 'body', hint: 'Roll d12 or pick below. Each body has a bonus, a cost, and a hunger.' };
  return null;
}

      onclick: () => {
        libraryFilterState[kind] = f;
        navigate(kind);
      }
    }, f);
    chips.appendChild(chip);
  });
  toolbar.appendChild(chips);

  root.appendChild(toolbar);

  const grid = h('div', { class: 'grid-list' });
  root.appendChild(grid);
  renderLibraryGrid(kind, grid);
}

function renderLibraryGrid(kind, grid) {
  clear(grid);
  const search = (librarySearchState[kind] || '').toLowerCase().trim();
  const filter = libraryFilterState[kind];
  let entries = state.library[kind];

  if (filter && filter !== 'All') {
    entries = entries.filter(e => {
      if (kind === 'techniques') return e.tier === filter;
      if (kind === 'methods') return e.type === filter;
      if (kind === 'items') return e.category === filter;
    });
  }
  if (search) {
    entries = entries.filter(e =>
      (e.name || '').toLowerCase().includes(search) ||
      (e.description || '').toLowerCase().includes(search) ||
      (e.effect || '').toLowerCase().includes(search)
    );
  }

  if (!entries.length) {
    grid.appendChild(h('div', { class: 'card empty' },
      'No entries. Click "+ New" above to create one.'
    ));
    return;
  }

  entries.sort((a, b) => (a.name || '').localeCompare(b.name || ''));

  entries.forEach(e => {
    if (kind === 'techniques') grid.appendChild(techniqueCard(e));
    else if (kind === 'methods') grid.appendChild(methodCard(e));
    else grid.appendChild(itemCard(e));
  });
}

function fieldText(label, value, onChange, opts = {}) {
  const input = h('input', {
    type: opts.type || 'text',
    class: 'field-input',
    value: value || '',
    placeholder: opts.placeholder || ''
  });
  input.addEventListener('input', () => onChange(input.value));
  return h('div', { class: 'field' },
    h('label', { class: 'field-label' }, label),
    input
  );
}

function fieldNumber(label, value, onChange, opts = {}) {
  const input = h('input', {
    type: 'number',
    class: 'field-input',
    value: value != null ? value : '',
    min: opts.min != null ? opts.min : '',
    max: opts.max != null ? opts.max : '',
    step: opts.step || '1'
  });
  input.addEventListener('input', () => {
    const v = input.value === '' ? null : Number(input.value);
    onChange(v);
  });
  return h('div', { class: 'field' },
    h('label', { class: 'field-label' }, label),
    input
  );
}

function fieldSelect(label, value, options, onChange, opts = {}) {
  const sel = h('select', { class: 'field-select' });
  if (opts.allowEmpty) sel.appendChild(h('option', { value: '' }, '— choose —'));
  options.forEach(o => {
    const [val, disp] = Array.isArray(o) ? o : [o, o];
    const optEl = h('option', { value: val }, disp);
    if (val === value) optEl.setAttribute('selected', '');
    sel.appendChild(optEl);
  });
  sel.value = value || '';
  sel.addEventListener('change', () => onChange(sel.value));
  return h('div', { class: 'field' },
    h('label', { class: 'field-label' }, label),
    sel
  );
}

function fieldTextarea(label, value, onChange, placeholder) {
  const area = h('textarea', {
    class: 'field-textarea',
    placeholder: placeholder || ''
  }, value || '');
  area.addEventListener('input', () => onChange(area.value));
  return h('div', { class: 'field' },
    h('label', { class: 'field-label' }, label),
    area
  );
}

function renderCharacterEdit(root) {
  const id = routeParams.id;
  const c = state.characters.find(x => x.id === id);
  if (!c) {
    root.appendChild(h('div', { class: 'note-box' }, 'Character not found.'));
    return;
  }

  const save = () => {
    c.updatedAt = nowIso();
    saveState();
  };
  const debouncedSave = debounce(save, 300);

  // Derived-stat recalc system — sections can register updaters
  const updaters = [];
  const recalc = () => updaters.forEach(fn => fn());

  // Header
  root.appendChild(h('div', { class: 'page-header' },
    h('div', { class: 'page-title' },
      h('span', { class: 'chinese' }, '人'),
      h('span', { class: 'english' }, c.name || 'Cultivator')
    ),
    h('div', { class: 'page-actions' },
      h('button', { class: 'btn', onclick: () => navigate('characters') }, '← Back'),
      h('button', { class: 'btn danger', onclick: () => deleteCharacter(c.id) }, 'Delete')
    )
  ));

  // ==== Identity band ====
  const idBand = h('div', { class: 'identity-band' });
  idBand.appendChild(fieldText('Character Name', c.name, v => { c.name = v; debouncedSave(); }));
  idBand.appendChild(fieldText("Player", c.player, v => { c.player = v; debouncedSave(); }));
  idBand.appendChild(fieldSelect('Origin', c.origin, ORIGINS, v => { c.origin = v; debouncedSave(); }));
  root.appendChild(idBand);

  const grid = h('div', { class: 'char-editor' });
  root.appendChild(grid);
  const left = h('div', {});
  const right = h('div', {});
  grid.appendChild(left);
  grid.appendChild(right);

  // ===== LEFT COLUMN =====

  // --- Realm ---
  {
    const sec = h('div', { class: 'section' });
    sec.appendChild(sectionHeader('境界', 'Realm & Sub-stage'));
    const realmWrap = h('div', {});
    sec.appendChild(realmWrap);

    const renderRealmRow = () => {
      clear(realmWrap);
      const row = h('div', { class: 'field-row two' });
      row.appendChild(fieldSelect('Realm', c.realm, REALMS, v => {
        c.realm = v;
        if (v === 'Mortal') c.substage = 'Early';
        debouncedSave();
        recalc();
        renderRealmRow();
      }));
      const isMortal = c.realm === 'Mortal';
      if (!isMortal) {
        row.appendChild(fieldSelect('Sub-stage', c.substage, SUB_STAGES, v => {
          c.substage = v;
          debouncedSave();
          recalc();
        }));
      } else {
        row.appendChild(h('div', { class: 'field' },
          h('label', { class: 'field-label' }, 'Sub-stage'),
          h('div', { style: { padding: '8px 0', color: 'var(--ink-faded)', fontStyle: 'italic' } },
            'Mortal (Tier 0) — no sub-stages')
        ));
      }
      realmWrap.appendChild(row);

      // Tier readout + advance controls
      const tier = getTier(c.realm, c.substage);
      const tierLine = h('div', {
        style: {
          marginTop: '6px',
          fontFamily: 'Cormorant SC, serif', fontSize: '11px', letterSpacing: '2px',
          color: 'var(--ink-faded)', textTransform: 'uppercase'
        }
      }, 'Realm Tier: ', h('span', { style: { color: 'var(--cinnabar-deep)', fontWeight: '600' } }, String(tier)));
      realmWrap.appendChild(tierLine);

      const ctrls = h('div', { class: 'stage-controls' });
      ctrls.appendChild(h('button', {
        class: 'btn small',
        disabled: c.realm === 'Mortal' ? 'disabled' : null,
        onclick: () => {
          advanceCharacterStage(c, -1);
          save();
          recalc();
          renderRealmRow();
          notice('Regressed to ' + c.realm + (c.realm === 'Mortal' ? '' : ' ' + c.substage));
        }
      }, '← Regress'));
      ctrls.appendChild(h('button', {
        class: 'btn small primary',
        disabled: (c.realm === 'Nirvana Shatterer' && c.substage === 'Peak') ? 'disabled' : null,
        onclick: () => {
          const prevQiMax = computeDerived(c).qiMax;
          advanceCharacterStage(c, 1);
          const newQiMax = computeDerived(c).qiMax;
          // Top off qi on advance (canonical: breakthrough restores pool)
          if (c.qi && typeof c.qi.current === 'number' && newQiMax > prevQiMax) {
            c.qi.current = newQiMax;
          }
          save();
          recalc();
          renderRealmRow();
          notice('Advanced to ' + c.realm + (c.realm === 'Mortal' ? '' : ' ' + c.substage));
        }
      }, 'Advance Sub-stage →'));
      realmWrap.appendChild(ctrls);
    };
    renderRealmRow();

    sec.appendChild(h('div', { style: { marginTop: '14px' } },
      fieldSelect('Affiliation', c.affiliation, AFFILIATIONS,
        v => { c.affiliation = v; debouncedSave(); })
    ));
    left.appendChild(sec);
  }

  // --- Attributes ---
  {
    const sec = h('div', { class: 'section' });
    sec.appendChild(sectionHeader('本命', 'Attributes'));
    const attrs = h('div', { class: 'attributes' });
    [

      const input = h('input', {
        type: 'number', class: 'attr-input', min: '1', max: '5',

      });
      input.addEventListener('input', () => {
        c.attributes[a.key] = Number(input.value) || 1;

      attrs.appendChild(h('div', { class: 'attr' },
        h('div', { class: 'attr-label' }, a.cn),
        h('div', { class: 'attr-en' }, a.en),

  // --- Spiritual Root & Dao Seed ---
  {
    const sec = h('div', { class: 'section' });
    sec.appendChild(sectionHeader('根·道', 'Spiritual Root & Dao Seed'));

    // Normalize legacy data
    if (typeof c.root.elements === 'string') {
      c.root.elements = c.root.elements.split(',').map(s => s.trim()).filter(Boolean);
    }
    if (!Array.isArray(c.root.elements)) c.root.elements = [];
    if (c.root.mutant == null) c.root.mutant = '';
    if (c.root.heavenlyBody == null) c.root.heavenlyBody = '';

    const rootBody = h('div', {});
    sec.appendChild(rootBody);

        const grid = h('div', {

          );
          grid.appendChild(btn);

        wrap.appendChild(grid);

        // Validation feedback
        const count = c.root.elements.length;
        const warnings = [];
        if (spec.min && count < spec.min) warnings.push(`Pick ${spec.min - count} more element${spec.min - count > 1 ? 's' : ''}.`);

    const woundLabel = h('div', { class: 'field-label' });
    woundWrap.appendChild(woundLabel);
    const woundBox = h('div', { class: 'box-track' });
    woundWrap.appendChild(woundBox);
    const woundStatus = h('div', {
      style: {
        fontFamily: 'Cormorant SC, serif', fontSize: '10px', letterSpacing: '2px',
        color: 'var(--ink-faded)', marginTop: '8px', textTransform: 'uppercase'
      }
    });
    woundWrap.appendChild(woundStatus);

    const renderWounds = () => {
      const d = computeDerived(c);
      const TOTAL = Math.max(1, d.woundCap);
      // Clamp
      c.wounds = Math.min(Math.max(0, c.wounds), TOTAL);
      c.woundsCritical = Math.min(Math.max(0, c.woundsCritical), c.wounds);

      // Update max display
      qiMaxEl.textContent = String(d.qiMax);
      woundLabel.textContent = `Wounds — click once for surface, twice for critical (${c.wounds}/${TOTAL})`;

      clear(woundBox);
      for (let i = 0; i < TOTAL; i++) {
        const cls = i < c.woundsCritical ? ' critical' : (i < c.wounds ? ' filled' : '');
        const cell = h('div', { class: 'box-cell' + cls });
        cell.addEventListener('click', () => {
          // 3-state cycle per slot
          if (i >= c.wounds) {
            c.wounds = i + 1;
          } else if (i >= c.woundsCritical) {
            c.woundsCritical = i + 1;
          } else {
            c.wounds = i;
            c.woundsCritical = Math.min(c.woundsCritical, i);
          }
          save();
          renderWounds();
        });
        woundBox.appendChild(cell);
      }

      const half = Math.ceil(TOTAL / 2);
      const filled = c.wounds;
      let statusText = '';
      if (filled >= TOTAL) statusText = 'DYING — take the killing blow, or spend a prepared countermeasure.';
      else if (filled >= half) statusText = `Wounded (${filled}/${TOTAL}) — penalties active at ≥ ${half}.`;
      else if (filled > 0) statusText = `Lightly wounded (${filled}/${TOTAL}).`;
      else statusText = `Unhurt — penalties begin at ${half} of ${TOTAL}.`;
      woundStatus.textContent = statusText;
      woundStatus.style.color = filled >= TOTAL ? 'var(--cinnabar-deep)'
        : filled >= half ? 'var(--cinnabar)'
        : 'var(--ink-faded)';
    };
    renderWounds();
    updaters.push(renderWounds);

    sec.appendChild(woundWrap);

        row.appendChild(h('div', {},
          h('div', { class: 'list-row-name' }, d.name),
          h('div', { class: 'list-row-meta' }, (d.level || 'Novice') + ' · Insight: ' + (d.insight || 0))
        ));

        const lvl = h('select', { class: 'field-select', style: { width: '120px' } });
        ['Novice', 'Adept', 'Master', 'Grandmaster', 'Void Mastery'].forEach(l => {
          const o = h('option', { value: l }, l);
          if (l === (d.level || 'Novice')) o.setAttribute('selected', '');
          lvl.appendChild(o);
        });
        lvl.value = d.level || 'Novice';
        lvl.addEventListener('change', () => { d.level = lvl.value; save(); renderDaos(); });

        const ins = h('input', {
          type: 'number', class: 'field-input', style: { width: '60px', textAlign: 'center' },
          value: d.insight || 0, min: '0'
        });
        ins.addEventListener('input', () => { d.insight = Number(ins.value) || 0; debouncedSave(); });

        row.appendChild(h('div', { style: { display: 'flex', gap: '6px', alignItems: 'center' } }, lvl, ins));
        row.appendChild(h('button', {
          class: 'row-delete',
          onclick: () => { c.daos.splice(idx, 1); save(); renderDaos(); }
        }, '×'));
        list.appendChild(row);
      });
    };
    renderDaos();
    sec.appendChild(list);

    const addRow = h('div', { style: { marginTop: '8px', display: 'flex', gap: '8px' } });
    const sel = h('select', { class: 'field-select', style: { flex: '1' } });
    sel.appendChild(h('option', { value: '' }, '— choose Dao —'));
    DAOS.forEach(d => sel.appendChild(h('option', { value: d }, d)));
    addRow.appendChild(sel);
    addRow.appendChild(h('button', { class: 'btn small', onclick: () => {
      if (!sel.value) return;
      c.daos.push({ name: sel.value, level: 'Novice', insight: 0 });
      sel.value = '';
      save();
      renderDaos();
    }}, '+ Add'));
    sec.appendChild(addRow);
    right.appendChild(sec);
  }

  // --- Lores & Practices ---
  {
    const sec = h('div', { class: 'section' });
    sec.appendChild(sectionHeader('学·行', 'Lores & Practices'));
    sec.appendChild(fieldTextarea('Lores (comma-separated)',
      c.lores.join(', '),
      v => { c.lores = v.split(',').map(s => s.trim()).filter(Boolean); debouncedSave(); },
      'Mortal Lore, Herb Lore, Sect Politics…'));

    const pracList = h('div', { class: 'list-rows' });
    const renderPrac = () => {
      clear(pracList);
      if (!c.practices.length) {
        pracList.appendChild(h('div', { class: 'list-empty' }, 'No practices trained.'));
        return;
      }
      c.practices.forEach((p, idx) => {
        const row = h('div', { class: 'list-row' });
        const nameInput = h('input', { class: 'field-input', value: p.name });
        nameInput.addEventListener('input', () => { p.name = nameInput.value; debouncedSave(); });
        row.appendChild(nameInput);
        const rankSel = h('select', { class: 'field-select', style: { width: '140px' } });
        ['Trained (+1)', 'Well-Practiced (+2)', 'Masterful (+3)'].forEach((r, ri) => {
          const o = h('option', { value: ri + 1 }, r);
          if ((p.rank || 1) === ri + 1) o.setAttribute('selected', '');
          rankSel.appendChild(o);
        });
        rankSel.value = p.rank || 1;
        rankSel.addEventListener('change', () => { p.rank = Number(rankSel.value); save(); });
        row.appendChild(rankSel);
        row.appendChild(h('button', {
          class: 'row-delete',
          onclick: () => { c.practices.splice(idx, 1); save(); renderPrac(); }
        }, '×'));
        pracList.appendChild(row);
      });
    };
    renderPrac();
    sec.appendChild(h('div', { class: 'field-label', style: { marginTop: '10px' } }, 'Practices'));
    sec.appendChild(pracList);
    const addPrac = h('button', { class: 'btn small', style: { marginTop: '8px' },
      onclick: () => { c.practices.push({ name: '', rank: 1 }); save(); renderPrac(); }
    }, '+ Add Practice');
    sec.appendChild(addPrac);
    right.appendChild(sec);
  }

  // --- Ties & Notes ---
  {
    const sec = h('div', { class: 'section' });
    sec.appendChild(sectionHeader('缘·记', 'Ties & Notes'));
    sec.appendChild(fieldTextarea('Ties (family, allies, oaths, blood debts)',
      c.ties, v => { c.ties = v; debouncedSave(); },
      'Living parents in home village · Sworn brother Zhang Hu · Blood debt owed to Lu family…'));
    sec.appendChild(fieldTextarea('Player Notes',
      c.notes, v => { c.notes = v; debouncedSave(); },
      'Countermeasures prepared, favor tracking, session to-dos…'));
    right.appendChild(sec);
  }
}

function sectionHeader(cn, en) {
  return h('div', { class: 'section-header' },
    h('h2', {}, cn),
    h('span', { class: 'en' }, en)
  );
}

function openCharacterMethodEditor(c, custom, onSaved) {
  const body = h('div', {});
  body.appendChild(fieldText('Name', custom.name, v => custom.name = v));
  const row1 = h('div', { class: 'field-row two' });
  row1.appendChild(fieldSelect('Type', custom.type, METHOD_TYPES, v => custom.type = v));
  row1.appendChild(fieldSelect('Peak Realm', custom.peakRealm, PEAK_REALMS, v => custom.peakRealm = v));
  body.appendChild(row1);
  body.appendChild(fieldTextarea('Description', custom.description, v => custom.description = v));
  openDialog({
    title: 'Custom Method',
    content: body,
    actions: [
      { label: 'Cancel', handler: closeDialog },
      { label: 'Set Method', primary: true, handler: () => {
        if (!custom.name.trim()) { notice('Name required.', 'cinnabar'); return; }
        c.method.ref = null;
        c.method.frozen = { ...custom };
        c.updatedAt = nowIso();
        saveState();
        closeDialog();
        onSaved();
      }}
    ]
  });
}

// ============================================================================
// PICKER
// ============================================================================

function openPicker({ title, entries, subtitleFn, onPick }) {
  const body = h('div', {});
  const search = h('input', { class: 'picker-search', placeholder: 'Filter…' });
  body.appendChild(search);

  const list = h('div', { class: 'picker-list' });
  body.appendChild(list);

  const renderList = () => {
    clear(list);
    const q = search.value.toLowerCase().trim();
    let filtered = entries;
    if (q) {
      filtered = entries.filter(e =>
        (e.name || '').toLowerCase().includes(q) ||
        (e.effect || '').toLowerCase().includes(q) ||
        (e.description || '').toLowerCase().includes(q)
      );
    }
    filtered = [...filtered].sort((a, b) => (a.name || '').localeCompare(b.name || ''));
    if (!filtered.length) {
      list.appendChild(h('div', { class: 'list-empty' }, 'No matches. Add entries in the Library first.'));
      return;
    }
    filtered.forEach(e => {
      const item = h('div', { class: 'picker-item', onclick: () => onPick(e) });
      item.appendChild(h('div', { class: 'picker-item-name' }, e.name || '(Unnamed)'));
      const sub = subtitleFn ? subtitleFn(e) : '';
      if (sub) item.appendChild(h('div', { class: 'picker-item-meta' }, sub));
      if (e.effect) item.appendChild(h('div', {
        style: { fontSize: '13px', color: 'var(--ink-soft)', marginTop: '3px' }
      }, e.effect));
      list.appendChild(item);
    });
  };
  renderList();
  search.addEventListener('input', renderList);
  setTimeout(() => search.focus(), 50);

  openDialog({
    title,
    content: body,
    actions: [{ label: 'Cancel', handler: closeDialog }]
  });
}

// ============================================================================
// VIEW: DATA (Export / Import)
// ============================================================================

function renderData(root) {
  root.appendChild(h('div', { class: 'page-header' },
    h('div', { class: 'page-title' },
      h('span', { class: 'chinese' }, '籍录'),
      h('span', { class: 'english' }, 'Export & Import')
    )
  ));

  root.appendChild(h('div', { class: 'note-box' },
    'All data is stored in this browser only. Use Export to save a JSON file — share the Library with players, send character files to your GM, back up your campaign.'
  ));

  // Export everything
  const sec1 = h('div', { class: 'section' });
  sec1.appendChild(sectionHeader('导出', 'Export'));
  const row1 = h('div', { class: 'field-row three' });
  row1.appendChild(exportCard('Everything', 'Entire ledger: library + characters + settings.',
    () => exportData(state, 'cultivation_campaign')));
  row1.appendChild(exportCard('Library only', 'Techniques, Methods, Items (no characters). GM → players.',
    () => exportData({ version: SCHEMA_VERSION, library: state.library }, 'cultivation_library')));
  row1.appendChild(exportCard('Characters only', 'All characters (no library).',
    () => exportData({ version: SCHEMA_VERSION, characters: state.characters }, 'cultivation_characters')));
  sec1.appendChild(row1);
  root.appendChild(sec1);

  // Export single character
  if (state.characters.length) {
    const sec2 = h('div', { class: 'section' });
    sec2.appendChild(sectionHeader('单人', 'Export Single Character'));
    const grid = h('div', { class: 'grid-list' });
    state.characters.forEach(c => {
      const card = h('div', { class: 'card' });
      card.appendChild(h('div', { class: 'card-name' }, c.name || '(Unnamed)'));
      card.appendChild(h('div', { class: 'card-subtitle' },
        [c.origin, c.realm].filter(Boolean).join(' · ')));
      card.appendChild(h('div', { class: 'card-actions' },
        h('button', { class: 'btn small', onclick: () =>
          exportData({ version: SCHEMA_VERSION, character: c },
            'cultivation_char_' + (c.name || 'unnamed').replace(/\s+/g, '_').toLowerCase())
        }, 'Export')
      ));
      grid.appendChild(card);
    });
    sec2.appendChild(grid);
    root.appendChild(sec2);
  }

  // Import
  const sec3 = h('div', { class: 'section' });
  sec3.appendChild(sectionHeader('导入', 'Import'));
  const note = h('div', { class: 'note-box' },
    'Import merges into your current data. Library entries with the same ID are updated; new ones are added. Characters are always added as new copies (never overwritten).'
  );
  sec3.appendChild(note);

  const fileInput = h('input', { type: 'file', accept: '.json', style: { display: 'none' } });
  fileInput.addEventListener('change', async () => {
    const file = fileInput.files[0];
    if (!file) return;
    try {
      const text = await file.text();
      const data = JSON.parse(text);
      await importData(data);
    } catch (e) {
      notice('Import failed: invalid JSON.', 'cinnabar');
      console.error(e);
    }
    fileInput.value = '';
  });

  sec3.appendChild(h('button', { class: 'btn primary',
    onclick: () => fileInput.click() }, 'Choose JSON File'));
  sec3.appendChild(fileInput);
  root.appendChild(sec3);

  // Danger zone
  const sec4 = h('div', { class: 'section' });
  sec4.appendChild(sectionHeader('毁', 'Danger'));
  sec4.appendChild(h('div', { class: 'note-box' },
    'Clear all data from this browser. Make sure you have exported a backup first.'
  ));
  sec4.appendChild(h('button', { class: 'btn danger', onclick: async () => {
    const ok = await confirmDialog('Erase ALL data in this browser — library, characters, settings? This cannot be undone.');
    if (!ok) return;
    const ok2 = await confirmDialog('Are you absolutely sure? One more confirmation.');
    if (!ok2) return;
    localStorage.removeItem(STORAGE_KEY);
    state = structuredClone(DEFAULT_STATE);
    saveState();
    navigate('home');
    notice('All data erased.', 'cinnabar');
  }}, 'Erase Everything'));
  root.appendChild(sec4);
}

function exportCard(title, desc, onClick) {
  return h('div', { class: 'card' },
    h('div', { class: 'card-name' }, title),
    h('div', { class: 'card-body' }, desc),
    h('div', { class: 'card-actions' },
      h('button', { class: 'btn small', onclick: onClick }, 'Download')
    )
  );
}

function exportData(data, baseName) {
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const stamp = new Date().toISOString().slice(0, 10);
  const a = h('a', { href: url, download: baseName + '_' + stamp + '.json' });
  document.body.appendChild(a);
  a.click();
  a.remove();
  URL.revokeObjectURL(url);
  notice('Exported.');
}

async function importData(data) {
  if (!data || typeof data !== 'object') {
    notice('Invalid data file.', 'cinnabar');
    return;
  }

  let summary = [];

  // Single character export
  if (data.character && !data.characters) {
    data.characters = [data.character];
  }

  if (data.library) {
    for (const kind of ['techniques', 'methods', 'items']) {
      const entries = data.library[kind];
      if (!Array.isArray(entries)) continue;
      let added = 0, updated = 0;
      entries.forEach(e => {
        if (!e || !e.id) { e && (e.id = uid()); }
        const idx = state.library[kind].findIndex(x => x.id === e.id);
        if (idx >= 0) { state.library[kind][idx] = e; updated++; }
        else { state.library[kind].push(e); added++; }
      });
      if (added || updated) summary.push(`${kind}: +${added} new, ${updated} updated`);
    }
  }

  if (Array.isArray(data.characters)) {
    let added = 0;
    data.characters.forEach(c => {
      if (!c) return;
      // Always import as a new character to avoid overwriting; give fresh ID
      c.id = uid();
      c.importedAt = nowIso();
      if (!c.updatedAt) c.updatedAt = nowIso();
      state.characters.push(c);
      added++;
    });
    if (added) summary.push(`characters: +${added}`);
  }

  saveState();
  navigate(currentView);
  notice('Imported. ' + (summary.join('; ') || 'No changes.'));
}

// UTILS

function debounce(fn, ms) {
  let t;
  return (...args) => {
    clearTimeout(t);
    t = setTimeout(() => fn(...args), ms);
  };
}
